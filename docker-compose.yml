version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=wb_api
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - API_KEY=E6kUTYrYwZq2tN4QEtyzsbEBk3ie
      - WB_API_HOST=http://109.73.206.144:6969
      - WB_API_KEY=E6kUTYrYwZq2tN4QEtyzsbEBk3ie
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wb_api
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
